<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or "Expense Tracker" }}</title>
    <style>
      :root { color-scheme: light; }
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; background: #f6f7fb; color: #111827; }
      .container { max-width: 980px; margin: 0 auto; padding: 24px; }
      .card { background: white; border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
      h1 { margin: 0 0 12px; font-size: 22px; }
      .grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
      @media (min-width: 900px) { .grid { grid-template-columns: 360px 1fr; } }
      label { font-size: 12px; color: #374151; display: block; margin-bottom: 6px; }
      input, select { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 10px; }
      button { padding: 10px 12px; border: 0; background: #2563eb; color: white; border-radius: 10px; cursor: pointer; font-weight: 600; }
      button:hover { background: #1d4ed8; }
      .row { display: flex; gap: 12px; }
      .row > div { flex: 1; }
      table { width: 100%; border-collapse: collapse; }
      th, td { text-align: left; padding: 10px; border-bottom: 1px solid #e5e7eb; font-size: 14px; vertical-align: top; }
      th { font-size: 12px; color: #374151; text-transform: uppercase; letter-spacing: .04em; }
      .muted { color: #6b7280; font-size: 12px; }
      .total { font-size: 18px; font-weight: 700; }
    </style>
  </head>
  <body>
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </body>
</html>
